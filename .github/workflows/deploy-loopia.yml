name: Deploy plugin to Loopia

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOOPIA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.LOOPIA_HOST }}" >> ~/.ssh/known_hosts

      - name: Create deploy package
        run: |
          rm -rf .deploy
          mkdir -p .deploy

          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="src" \
            --exclude="tests" \
            --exclude=".editorconfig" \
            --exclude=".eslintrc*" \
            --exclude=".gitignore" \
            --exclude="package-lock.json" \
            --exclude="package.json" \
            --exclude="webpack.config.js" \
            ./ .deploy/

      - name: Deploy to Loopia
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            .deploy/ \
            "${{ secrets.LOOPIA_USER }}@${{ secrets.LOOPIA_HOST }}:${{ secrets.LOOPIA_PATH }}/"
