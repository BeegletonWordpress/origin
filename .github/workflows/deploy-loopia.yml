name: Deploy plugin to Loopia

on:
  push:
    branches:
      - main
    paths: 
      - 'plugins/my-custom-block/**'
      - '.github/workflows/deploy-loopia.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'plugins/my-custom-block/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: plugins/my-custom-block

      - name: Build plugin
        run: npm run build
        working-directory: plugins/my-custom-block

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.LOOPIA_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.LOOPIA_HOST }}" >> ~/.ssh/known_hosts
      
      - name: Verify SSH key
        run: |
          ssh-keygen -lf ~/.ssh/id_ed25519
      
      - name: Test SSH login
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.LOOPIA_USER }}@${{ secrets.LOOPIA_HOST }}" \
            "pwd && whoami"
      
      - name: Deploy to Loopia
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            .deploy/ \
            "${{ secrets.LOOPIA_USER }}@${{ secrets.LOOPIA_HOST }}:${{ secrets.LOOPIA_PATH }}/"
